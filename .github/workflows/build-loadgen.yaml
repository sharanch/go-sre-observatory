name: Build and Push Go loadgen App

on:
  push:
    branches: [ "main" ]
    paths:
      - 'k8s/loadgen/**' # Triggers on any change in the loadgen folder
      - '.github/workflows/build-loadgen.yaml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'k8s/loadgen/**'

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/loadgen
          tags: |
            type=sha,format=short
            type=raw,value=latest

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          # This must point to the folder containing your Dockerfile/main.go
          context: ./k8s/loadgen
          file: ./k8s/loadgen/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max