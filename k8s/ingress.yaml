apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: observatory-ingress
  namespace: observatory
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - host: observatory.local
    http:
      paths:
      - path: /grafana(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
      - path: /prometheus(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: prometheus
            port:
              number: 9090
      - path: /alertmanager(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: alertmanager
            port:
              number: 9093
      - path: /(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: observatory-app
            port:
              number: 80