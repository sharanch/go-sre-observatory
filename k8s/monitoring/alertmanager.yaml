apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-secret
  namespace: observatory
type: Opaque
stringData:
  # Replace with your actual Slack webhook URL before deploying
  SLACK_WEBHOOK_URL: "https://hooks.slack.com/services/YOUR/SLACK/WEBHOOK"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: observatory
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    templates:
      - /etc/alertmanager/templates/*.tmpl

    route:
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: slack-default

      routes:
        - match:
            severity: critical
          receiver: slack-critical
          continue: true
        - match:
            severity: warning
          receiver: slack-warning

    receivers:
      - name: slack-default
        slack_configs:
          - api_url_file: /etc/alertmanager/slack_url
            channel: "#all-alerts"
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            color: '{{ template "slack.color" . }}'

      - name: slack-critical
        slack_configs:
          - api_url_file: /etc/alertmanager/slack_url
            channel: "#all-alerts"
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            color: "danger"

      - name: slack-warning
        slack_configs:
          - api_url_file: /etc/alertmanager/slack_url
            channel: "#all-alerts"
            send_resolved: true
            title: '{{ template "slack.title" . }}'
            text: '{{ template "slack.text" . }}'
            color: "warning"

    inhibit_rules:
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: [alertname]

  slack.tmpl: |
    {{ define "slack.title" -}}
    [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
    {{- end }}

    {{ define "slack.text" -}}
    {{ range .Alerts }}
    *Summary:* {{ .Annotations.summary }}
    *Description:* {{ .Annotations.description }}
    {{ if .Annotations.runbook }}*Runbook:* <{{ .Annotations.runbook }}|View runbook>{{ end }}
    *Started:* {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
    {{ end }}
    {{- end }}

    {{ define "slack.color" -}}
    {{ if eq .Status "firing" -}}
      {{ if eq (index .GroupLabels "severity") "critical" }}danger{{ else }}warning{{ end }}
    {{- else }}good{{ end }}
    {{- end }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: observatory
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - "--config.file=/etc/alertmanager/alertmanager.yml"
            - "--storage.path=/alertmanager"
          ports:
            - containerPort: 9093
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            - name: templates
              mountPath: /etc/alertmanager/templates
            - name: slack-url
              mountPath: /etc/alertmanager/slack_url
              subPath: SLACK_WEBHOOK_URL
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
            items:
              - key: alertmanager.yml
                path: alertmanager.yml
        - name: templates
          configMap:
            name: alertmanager-config
            items:
              - key: slack.tmpl
                path: slack.tmpl
        - name: slack-url
          secret:
            secretName: alertmanager-secret
            items:
              - key: SLACK_WEBHOOK_URL
                path: SLACK_WEBHOOK_URL
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: observatory
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
  type: ClusterIP